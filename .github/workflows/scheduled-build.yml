name: Scheduled Deploy

on:
  schedule:
    - cron: '0 19 * * *'  # JST 4:00（UTC 19:00）
  workflow_dispatch:         # 手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Scryfall card data
        run: node scripts/fetch-cards.js

      - name: Fetch JustTCG price mover data
        run: node scripts/fetch-price-movers.js
        env:
          JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}

      - name: Fetch YouTube video data
        run: node scripts/fetch-videos.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Save generated cache
        uses: actions/cache/save@v4
        with:
          path: src/generated
          key: generated-${{ runner.os }}-${{ github.run_id }}

      - name: Build & Deploy
        run: npm run deploy
        env:
          SKIP_PREBUILD: 'true'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
